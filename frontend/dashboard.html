<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard POS</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { background:#f5f7fb; }

.card-soft {
  border:none;
  border-radius:16px;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

.navbar { box-shadow:0 2px 8px rgba(0,0,0,0.1); }

.metric {
  font-size:1.4rem;
  font-weight:700;
}

.sub {
  font-size:0.8rem;
  color:#6c757d;
}

.table td, .table th {
  vertical-align: middle;
}

.badge-soft {
  background: #e9f2ff;
  color: #0d6efd;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 0.75rem;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark px-4">
  <span class="navbar-brand">📊 Dashboard POS Limpieza</span>
  <div class="d-flex gap-2">
    <a href="ventas.html" class="btn btn-outline-light btn-sm">Ventas</a>
    <a href="productos.html" class="btn btn-outline-light btn-sm">Productos</a>
  </div>
</nav>

<div class="container py-4">

  <!-- TARJETAS -->
  <div class="row g-3">

    <div class="col-md-3">
      <div class="card card-soft text-center p-3">
        <div>Ventas hoy</div>
        <div class="metric" id="ventasHoy">0</div>
        <div class="sub" id="ingresosHoy">$0</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card card-soft text-center p-3">
        <div>Ventas mes</div>
        <div class="metric" id="ventasMes">0</div>
        <div class="sub" id="ingresosMes">$0</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card card-soft text-center p-3">
        <div>Ingresos totales</div>
        <div class="metric" id="ingresosTotales">$0</div>
      </div>
    </div>

    <div class="col-md-3">
      <div class="card card-soft text-center p-3">
        <div>Producto top</div>
        <div class="metric" id="productoTop">-</div>
        <div class="sub" id="productoVeces"></div>
      </div>
    </div>

  </div>

  <!-- GRAFICAS -->
  <div class="row mt-4 g-4">

    <div class="col-md-6">
      <div class="card card-soft p-3">
        <h6>Ventas por día</h6>
        <canvas id="graficaVentas"></canvas>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card card-soft p-3">
        <h6>Productos más vendidos</h6>
        <canvas id="graficaProductos"></canvas>
      </div>
    </div>

  </div>

  <!-- TABLA -->
  <div class="row mt-4">
    <div class="col-md-12">
      <div class="card card-soft p-3">
        <div class="d-flex justify-content-between mb-2">
          <h6>🧾 Productos vendidos</h6>
          <small class="text-muted">Resumen reciente</small>
        </div>

        <div class="table-responsive">
          <table class="table table-sm">
            <thead>
              <tr>
                <th>Producto</th>
                <th>Veces</th>
                <th>Litros</th>
                <th>Ingresos</th>
              </tr>
            </thead>
            <tbody id="tablaProductosVendidos"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
const API = "https://pos-venta-backend.onrender.com";

let chartVentas;
let chartProductos;

async function cargarDashboard() {
  try {

    const hoy = await fetch(`${API}/estadisticas/ventas-hoy`).then(r=>r.json());
    document.getElementById("ventasHoy").textContent = hoy.cantidad_ventas || 0;
    document.getElementById("ingresosHoy").textContent = "$" + (hoy.total_ingresos||0).toFixed(2);

    const mes = await fetch(`${API}/estadisticas/ventas-mes`).then(r=>r.json());
    document.getElementById("ventasMes").textContent = mes.cantidad_ventas || 0;
    document.getElementById("ingresosMes").textContent = "$" + (mes.total_ingresos||0).toFixed(2);

    const total = await fetch(`${API}/estadisticas/ingresos-totales`).then(r=>r.json());
    document.getElementById("ingresosTotales").textContent = "$" + (total.total_ingresos||0).toFixed(2);

    const top = await fetch(`${API}/estadisticas/producto-mas-vendido`).then(r=>r.json());
    document.getElementById("productoTop").textContent = top.nombre || "-";
    document.getElementById("productoVeces").textContent = "Veces: " + (top.veces_vendido||0);

   const ventas = await fetch(`${API}/ventas`).then(r=>r.json());
console.log("VENTAS:", ventas);

    generarGraficaVentas(ventas);
    generarGraficaProductos(ventas);
    generarTablaProductos(ventas);

  } catch(e){
    console.error("ERROR DASHBOARD:", e);
  }
}

function generarGraficaVentas(ventas) {
  const mapa = {};

  ventas.forEach(v=>{
    if (!v.fecha || !v.total) return;

    const fecha = new Date(v.fecha).toLocaleDateString();
    mapa[fecha] = (mapa[fecha] || 0) + Number(v.total);
  });

  if (chartVentas) chartVentas.destroy();

  chartVentas = new Chart(document.getElementById("graficaVentas"), {
    type: 'line',
    data: {
      labels: Object.keys(mapa),
      datasets: [{
        label: 'Ventas ($)',
        data: Object.values(mapa)
      }]
    }
  });
}

function generarGraficaProductos(ventas) {
  const mapa = {};

  ventas.forEach(v=>{
    if (!v.items) return;

    v.items.forEach(i=>{
      if (!i.nombre) return;
      mapa[i.nombre] = (mapa[i.nombre] || 0) + 1;
    });
  });

  if (chartProductos) chartProductos.destroy();

  chartProductos = new Chart(document.getElementById("graficaProductos"), {
    type: 'bar',
    data: {
      labels: Object.keys(mapa),
      datasets: [{
        label: 'Ventas',
        data: Object.values(mapa)
      }]
    }
  });
}

function generarTablaProductos(ventas) {
  const mapa = {};

  ventas.forEach(v => {
    if (!v.items) return;

    v.items.forEach(i => {
      const nombre = i.nombre || "Sin nombre";

      if (!mapa[nombre]) {
        mapa[nombre] = { veces:0, litros:0, ingresos:0 };
      }

      mapa[nombre].veces++;
      mapa[nombre].ingresos += Number(i.subtotal || 0);

      if (i.cantidad_litros) {
        mapa[nombre].litros += Number(i.cantidad_litros);
      } else if (i.unidad_medida === "MILILITRO") {
        mapa[nombre].litros += Number(i.cantidad) / 1000;
      }
    });
  });

  const tabla = document.getElementById("tablaProductosVendidos");
  tabla.innerHTML = "";

  Object.entries(mapa).forEach(([nombre, d]) => {
    tabla.innerHTML += `
      <tr>
        <td>${nombre}</td>
        <td><span class="badge-soft">${d.veces}</span></td>
        <td>${d.litros.toFixed(2)} L</td>
        <td>$${d.ingresos.toFixed(2)}</td>
      </tr>
    `;
  });
}

setInterval(cargarDashboard, 10000);
cargarDashboard();
</script>

</body>
</html>
