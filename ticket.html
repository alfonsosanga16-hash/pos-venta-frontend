<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket de venta</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }

    .ticket {
      max-width: 380px;
      margin: auto;
      background: white;
      padding: 20px;
      border: 1px solid #ccc;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .ticket h2,
    .ticket p {
      text-align: center;
      margin: 5px 0;
    }

    .linea {
      border-top: 1px dashed #000;
      margin: 12px 0;
    }

    .item {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 6px 0;
      font-size: 14px;
    }

    .item span:first-child {
      flex: 1;
    }

    .total {
      font-size: 18px;
      font-weight: bold;
      text-align: right;
      margin-top: 15px;
    }

    .acciones {
      text-align: center;
      margin-top: 20px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      background: #198754;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }

    button:hover {
      background: #157347;
    }

    .error {
      color: red;
      text-align: center;
      font-weight: bold;
    }

    @media print {
      .acciones {
        display: none;
      }
      body {
        background: white;
        padding: 0;
      }
      .ticket {
        box-shadow: none;
        border: none;
      }
    }
  </style>
</head>
<body>

  <div class="ticket">
   <div style="text-align:center;">
  <img src="img/Logo.jpg" style="width:120px; margin-bottom:5px;">
  <h3 style="margin:0;">POS LIMPIEZA</h3>
</div>
    <p>Tienda de Productos de Limpieza</p>


    <p id="fecha"></p>

    <div class="linea"></div>

    <div id="items"></div>

    <div class="linea"></div>

    <p>Método de pago: <span id="metodoPago"></span></p>
    <p class="total">TOTAL: $<span id="total"></span></p>

    <div class="linea"></div>

    <p>¡Gracias por su compra!</p>

    <p id="errorMensaje" class="error"></p>

    <div class="acciones">
      <button onclick="window.print()">Imprimir</button>
      <button onclick="window.close()">Cerrar</button>
    </div>
  </div>

  <script>
    const textoVenta = localStorage.getItem("ticketVenta");

    if (!textoVenta) {
      document.getElementById("errorMensaje").textContent = "No se encontró información del ticket.";
    } else {
      try {
        const venta = JSON.parse(textoVenta);

        document.getElementById("fecha").textContent = new Date(venta.fecha).toLocaleString();
        document.getElementById("metodoPago").textContent = venta.metodo_pago || "No especificado";
        document.getElementById("total").textContent = Number(venta.total || 0).toFixed(2);

        const itemsDiv = document.getElementById("items");

        if (venta.items && venta.items.length > 0) {
          venta.items.forEach(item => {
            let detalle = "";

            if (item.cantidad_litros) {
              detalle = `${item.nombre} (${Number(item.cantidad_litros).toFixed(2)} L)`;
            } else if (item.unidad_medida === "MILILITRO") {
              detalle = `${item.nombre} (${Number(item.cantidad).toFixed(2)} ml)`;
            } else {
              detalle = `${item.nombre} (${Number(item.cantidad).toFixed(2)} ${item.unidad_medida || ""})`;
            }

            itemsDiv.innerHTML += `
              <div class="item">
                <span>${detalle}</span>
                <span>$${Number(item.subtotal || 0).toFixed(2)}</span>
              </div>
            `;
          });
        } else {
          document.getElementById("errorMensaje").textContent = "La venta no contiene productos.";
        }
      } catch (error) {
        console.error(error);
        document.getElementById("errorMensaje").textContent = "Error al leer los datos del ticket.";
      }
    }
  </script>

</body>

<!-- deploy fix -->

</html>
