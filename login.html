<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Login POS Limpieza</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: linear-gradient(135deg, #0d6efd, #0dcaf0);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.card-login {
  border: none;
  border-radius: 15px;
  padding: 30px;
  width: 350px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.title {
  font-weight: bold;
  text-align: center;
}

</style>
</head>

<body>

<div class="card card-login">
  <h4 class="title mb-4">🔐 POS Limpieza</h4>

  <input id="user" class="form-control mb-3" placeholder="Usuario">
  <input id="pass" type="password" class="form-control mb-3" placeholder="Contraseña">

  <button class="btn btn-primary w-100 fw-bold" onclick="login()">Ingresar</button>

  <div id="mensaje" class="mt-3 text-center"></div>
</div>

<script>
async function login() {
  const username = document.getElementById("user").value;
  const password = document.getElementById("pass").value;

  const res = await fetch("https://pos-venta-login-python.onrender.com", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.ok) {
    localStorage.setItem("usuario", JSON.stringify(data.usuario));

    if (data.usuario.rol === "ADMIN") {
      window.location.href = "productos.html";
    } else {
      window.location.href = "cajero.html";
    }

  } else {
    document.getElementById("mensaje").innerHTML =
      `<div class="alert alert-danger py-2">Usuario o contraseña incorrectos</div>`;
  }
}
</script>

</body>
</html>
